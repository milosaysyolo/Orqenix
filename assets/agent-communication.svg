<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" font-family="Inter, Arial">

  <!-- Background -->
  <rect width="1200" height="620" fill="#0B1020"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="600">
    Agent Communication Model
  </text>

  <!-- Orchestrator -->
  <rect x="470" y="90" width="260" height="80" rx="14" fill="#1E2A55" stroke="#5EE7DF" stroke-width="2"/>
  <text x="600" y="120" text-anchor="middle" fill="#5EE7DF" font-size="14">Orchestrator</text>
  <text x="600" y="145" text-anchor="middle" fill="#FFFFFF" font-size="12">Central Control</text>

  <!-- Agents -->
  <!-- Agent A -->
  <circle cx="250" cy="300" r="70" fill="#141B33" stroke="#5EE7DF" stroke-width="2"/>
  <text x="250" y="290" text-anchor="middle" fill="#5EE7DF">Agent A</text>
  <text x="250" y="310" text-anchor="middle" fill="#FFFFFF" font-size="11">Planner</text>

  <!-- Agent B -->
  <circle cx="600" cy="320" r="70" fill="#141B33" stroke="#5EE7DF" stroke-width="2"/>
  <text x="600" y="310" text-anchor="middle" fill="#5EE7DF">Agent B</text>
  <text x="600" y="330" text-anchor="middle" fill="#FFFFFF" font-size="11">Executor</text>

  <!-- Agent C -->
  <circle cx="950" cy="300" r="70" fill="#141B33" stroke="#5EE7DF" stroke-width="2"/>
  <text x="950" y="290" text-anchor="middle" fill="#5EE7DF">Agent C</text>
  <text x="950" y="310" text-anchor="middle" fill="#FFFFFF" font-size="11">Reviewer</text>

  <!-- Orchestrator control lines -->
  <g stroke="#5EE7DF" stroke-width="2">
    <line x1="600" y1="170" x2="250" y2="240"/>
    <line x1="600" y1="170" x2="600" y2="250"/>
    <line x1="600" y1="170" x2="950" y2="240"/>
  </g>

  <!-- Controlled communication (solid) -->
  <g stroke="#5EE7DF" stroke-width="2">
    <line x1="250" y1="300" x2="600" y2="320"/>
    <line x1="600" y1="320" x2="950" y2="300"/>
  </g>

  <!-- Direct communication (dashed, optional) -->
  <g stroke="#B490FF" stroke-width="2" stroke-dasharray="6,4">
    <line x1="250" y1="300" x2="950" y2="300"/>
  </g>

  <!-- Labels -->
  <text x="430" y="280" fill="#9AA6C2" font-size="11">Task / Response Flow</text>
  <text x="750" y="370" fill="#B490FF" font-size="11">Optional peer communication</text>

  <!-- Legend -->
  <rect x="880" y="430" width="260" height="140" rx="10" fill="#141B33" stroke="#3A6080"/>

  <text x="1010" y="455" text-anchor="middle" fill="#FFFFFF" font-size="13">Legend</text>

  <line x1="900" y1="480" x2="960" y2="480" stroke="#5EE7DF" stroke-width="2"/>
  <text x="970" y="485" fill="#FFFFFF" font-size="11">Orchestrated flow</text>

  <line x1="900" y1="510" x2="960" y2="510" stroke="#B490FF" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="970" y="515" fill="#FFFFFF" font-size="11">Direct agent communication</text>

  <line x1="900" y1="540" x2="960" y2="540" stroke="#5EE7DF" stroke-width="2"/>
  <text x="970" y="545" fill="#FFFFFF" font-size="11">Control and coordination</text>

</svg>
