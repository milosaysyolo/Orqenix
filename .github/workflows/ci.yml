name: CI

on:
  push: { branches: [main, "feat/**"] }
  pull_request: { branches: [main] }

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ['20', '22']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: ${{ matrix.node-version }}, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check .
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

  charter:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: Orqenix }
      - name: Clone Orqenix-Pro
        env:
          PRO_TOKEN: ${{ secrets.ORQENIX_PRO_READ_TOKEN }}
        run: |
          git clone https://x-access-token:${PRO_TOKEN}@github.com/milosaysyolo/Orqenix-Pro.git Orqenix-Pro
      - name: Run Phase 4 charter in Docker
        working-directory: Orqenix
        run: |
          docker build -t orqenix-charter -f charter/Dockerfile .
          docker run --rm \
            -v "${{ github.workspace }}/Orqenix:/repo" \
            -v "${{ github.workspace }}/Orqenix-Pro:/Orqenix-Pro" \
            -e ORQENIX_PRO_PATH=/Orqenix-Pro \
            -e CHARTER_VERBOSE=1 \
            orqenix-charter
