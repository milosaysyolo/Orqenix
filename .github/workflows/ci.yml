name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs on the same ref to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: ${{ matrix.os }} · node-${{ matrix.node }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      # Windows + better-sqlite3 needs MSVC; macOS/Linux usually has clang/gcc
      - name: Setup Windows build env
        if: runner.os == 'Windows'
        run: |
          echo "Skipping manual MSVC setup (node-gyp auto-detect)"
        shell: powershell

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Verify Phase 1
        run: pnpm verify-phase-1

      # Upload test artifacts on failure for debugging
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}-node${{ matrix.node }}
          path: |
            packages/*/test-results/
            packages/*/coverage/
          retention-days: 7
          if-no-files-found: ignore

  lint-format:
    name: lint + format check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prettier check
        run: pnpm exec prettier --check "**/*.{ts,tsx,js,json,md,yml,yaml}" --ignore-path .gitignore
      - name: Lint (if configured)
        run: pnpm lint || echo "::warning::lint not configured yet (Phase 2 polish)"

  ci-success:
    name: CI success
    needs: [verify, lint-format]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check matrix results
        run: |
          if [ "${{ needs.verify.result }}" != "success" ] || [ "${{ needs.lint-format.result }}" != "success" ]; then
            echo "::error::One or more required jobs failed"
            exit 1
          fi
          echo "All required jobs passed"
