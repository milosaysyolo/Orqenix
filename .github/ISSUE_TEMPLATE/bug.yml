name: Bug report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Steps to reproduce, expected vs actual behavior.
      placeholder: |
        1. Ran `orqenix sync`
        2. Expected ...
        3. Got ...
    validations:
      required: true
  - type: input
    id: orqenix-version
    attributes:
      label: Orqenix version
      placeholder: e.g., 0.1.0-phase-1
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: e.g., 20.18.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux x64
        - Linux ARM64
        - Windows x64
        - Windows ARM64
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
